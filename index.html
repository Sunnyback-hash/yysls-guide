function filterBuilds(){
  const q=(document.getElementById('buildSearch')?.value||'').toLowerCase();const w=document.getElementById('weaponFilter')?.value||'';const t=document.getElementById('tierFilter')?.value||'';
  const store=getStore();const all=[...(store.builds||[]),...(store.userBuilds||[]).map(b=>({...b,isUser:true}))];const ratings=store.ratings||{};
  const filtered=all.filter(b=>{if(q&&!b.name.toLowerCase().includes(q)&&!b.weapons.toLowerCase().includes(q)&&!b.xinfa.toLowerCase().includes(q))return false;if(w&&!b.weaponTags?.some(x=>x.includes(w)))return false;if(t&&b.tier!==t)return false;return true});
  const grid=document.getElementById('buildGrid');if(!grid)return;
  grid.innerHTML=filtered.map(b=>{const r=ratings[b.id];const rs=r&&r.count>0?'<span style="color:#f0c860">★</span> '+(r.total/r.count).toFixed(1)+' ('+r.count+'人)':'';return'<div class="build-card" onclick="navigate(\'/build/'+b.id+'\')"><div class="meta">'+b.tier+'-Tier · '+b.type+'</div><h3>'+b.name+(b.isUser?' <span class="editing-badge">玩家分享</span>':'')+'</h3><div class="sub">'+b.weapons+'</div><div class="tags">'+b.tags.map(t=>'<span class="tag '+(t.includes('S')?'tag-s':t.includes('A')?'tag-a':'tag-b')+'">'+t+'</span>').join('')+'</div><p>'+b.desc+'</p>'+(rs?'<div class="rating-mini">'+rs+'</div>':'')+'</div>'}).join('');
}

    <div class="card" style="margin-top:1.5rem"><div class="section-title">评论(${comments.length})</div><div class="comment-box"><textarea id="commentText" placeholder="写下你的看法..."></textarea><button class="btn btn-sm btn-primary" style="margin-top:.5rem" onclick="addComment('${id}')">发表评论</button></div><div id="commentList">${comments.length===0?'<p style="color:#6a6558;font-size:.85rem;padding:1rem 0">暂无评论</p>':comments.map(c=>'<div class="comment-item"><div><span class="author">'+c.author+'</span><span class="time">'+c.time+'</span></div><div class="text">'+c.text+'</div></div>').join('')}</div></div>
  </div></section>`;
}

function renderMaps(){
  const store=getStore();const maps=store.maps||[];
  document.getElementById('app').innerHTML=`<section class="page-section"><div class="container"><h2>地图探索·<span style="font-weight:300;color:#8a8478">Maps</span></h2><p style="text-align:center;color:#6a6558;margin-bottom:2rem;font-size:.85rem">推荐探索顺序：清河→开封→不见山→河西→青州→蓬山</p><div class="map-grid">${maps.map(m=>'<div class="map-card"><div class="map-banner" style="background:linear-gradient(135deg,'+m.color+'33,transparent);color:'+m.color+'">'+m.name+'</div><div class="map-body"><p>'+m.desc+'</p><div class="points">'+m.points.map(p=>'<span class="tag tag-s">'+p+'</span>').join('')+'</div></div></div>').join('')}</div></div></section>`;
}

function renderQuests(){
  const store=getStore();const quests=store.quests||[];
  document.getElementById('app').innerHTML=`<section class="page-section"><div class="container"><h2>任务攻略·<span style="font-weight:300;color:#8a8478">Quests</span></h2><p style="text-align:center;color:#6a6558;margin-bottom:2rem;font-size:.85rem">主线·支线·副本·探索任务指南</p><div class="search-bar"><input type="text" id="questSearch" placeholder="搜索任务..." oninput="filterQuests()"><select id="questTypeFilter" onchange="filterQuests()"><option value="">全部类型</option><option value="主线">主线</option><option value="支线">支线</option><option value="副本">副本</option><option value="探索">探索</option></select><select id="questMapFilter" onchange="filterQuests()"><option value="">全部区域</option>${[...new Set(quests.map(q=>q.map))].map(m=>'<option value="'+m+'">'+m+'</option>').join('')}</select></div><div class="tip-list" id="questList">${quests.map(q=>'<div class="tip-item"><div class="tip-num" style="font-size:.7rem">'+q.type+'</div><div><h4>'+q.name+'</h4><p>📍 '+q.map+' · '+q.desc+'</p></div></div>').join('')}</div></div></section>`;
}
function filterQuests(){
  const q=(document.getElementById('questSearch')?.value||'').toLowerCase();const t=document.getElementById('questTypeFilter')?.value||'';const m=document.getElementById('questMapFilter')?.value||'';
  const store=getStore();const filtered=(store.quests||[]).filter(x=>{if(q&&!x.name.toLowerCase().includes(q)&&!x.desc.toLowerCase().includes(q))return false;if(t&&x.type!==t)return false;if(m&&x.map!==m)return false;return true});
  const list=document.getElementById('questList');if(!list)return;
  list.innerHTML=filtered.map(q=>'<div class="tip-item"><div class="tip-num" style="font-size:.7rem">'+q.type+'</div><div><h4>'+q.name+'</h4><p>📍 '+q.map+' · '+q.desc+'</p></div></div>').join('');
}

function renderCommunity(){
  const store=getStore();const ub=store.userBuilds||[];
  document.getElementById('app').innerHTML=`<section class="page-section"><div class="container"><h2>玩家社区·<span style="font-weight:300;color:#8a8478">Community</span></h2><p style="text-align:center;color:#6a6558;margin-bottom:2rem;font-size:.85rem">加入社区·分享你的配装·与其他玩家交流</p>
    <div class="community-grid" style="margin-bottom:2rem">${[
      ['💬','Discord 国际社区','国际服玩家聚集地，英文/中文频道','https://discord.gg/wherewindsmeet'],
      ['📺','B站官方','最新视频攻略、版本预告、玩法解析','https://space.bilibili.com/3546787875972964'],
      ['📱','TapTap 社区','国内玩家评分、论坛讨论、配装分享','https://www.taptap.cn/app/234251'],
      ['🎮','Steam 社区','国际服讨论、评测、指南','https://steamcommunity.com/app/3173720']
    ].map(s=>'<a href="'+s[3]+'" target="_blank" rel="noopener" class="social-card"><div class="sicon">'+s[0]+'</div><div><h4>'+s[1]+'</h4><p>'+s[2]+'</p></div></a>').join('')}</div>
    <div class="share-section"><h3 style="font-size:1.1rem;color:#d4a843;margin-bottom:1rem">✏️ 分享你的配装</h3>
    <div class="form-row"><div class="form-group"><label>流派名称</label><input id="ubName" placeholder="如：我的冰火流"></div><div class="form-group"><label>武器</label><input id="ubWeapons" placeholder="如：无名剑+无名枪"></div></div>
    <div class="form-row"><div class="form-group"><label>心法</label><input id="ubXinfa" placeholder="心法配置"></div><div class="form-group"><label>Tier</label><select id="ubTier"><option value="S">S-Tier</option><option value="A">A-Tier</option><option value="B">B-Tier</option></select></div></div>
    <div class="form-group"><label>描述</label><textarea id="ubDesc" placeholder="简述流派玩法、核心思路..."></textarea></div>
    <button class="btn btn-sm btn-primary" onclick="shareBuild()">发布配装</button></div>
    <h3 style="font-size:1.05rem;color:#d4a843;margin-bottom:1rem;margin-top:2rem">玩家分享的配装 (${ub.length})</h3>
    <div id="userBuildList">${ub.length===0?'<p style="color:#6a6558;font-size:.85rem">还没有玩家分享配装，来做第一个吧！</p>':ub.map(b=>'<div class="build-card" style="cursor:default;margin-bottom:1rem"><h3>'+b.name+' <span class="editing-badge">玩家分享</span></h3><div class="sub">'+b.weapons+' · '+b.tier+'-Tier</div><p><strong>心法：</strong>'+b.xinfa+'<br>'+b.desc+'</p></div>').join('')}</div></div></section>`;
}

function renderAdmin(){
  const store=getStore();const bc=(store.builds||[]).length+(store.userBuilds||[]).length;const mc=(store.maps||[]).length;const qc=(store.quests||[]).length;const cc=Object.values(store.comments||{}).reduce((s,a)=>s+a.length,0);
  document.getElementById('app').innerHTML=`<section class="page-section"><div class="container"><h2>内容管理·<span style="font-weight:300;color:#8a8478">CMS</span></h2><p style="text-align:center;color:#6a6558;margin-bottom:2rem;font-size:.85rem">管理攻略内容·数据保存在本地浏览器</p>
    <div class="admin-grid"><div class="admin-card" onclick="showAdminTab('builds')"><div class="anum">${bc}</div><div class="alabel">流派攻略</div></div><div class="admin-card" onclick="showAdminTab('maps')"><div class="anum">${mc}</div><div class="alabel">地图区域</div></div><div class="admin-card" onclick="showAdminTab('quests')"><div class="anum">${qc}</div><div class="alabel">任务攻略</div></div><div class="admin-card" onclick="showAdminTab('comments')"><div class="anum">${cc}</div><div class="alabel">评论</div></div></div>
    <div style="background:#12121c;border:1px solid #1e1e2e;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem"><p style="font-size:.82rem;color:#6a6558;margin-bottom:.75rem">💡 数据存储在浏览器localStorage中，清除浏览器缓存会丢失数据。</p><button class="btn btn-sm btn-outline" onclick="exportData()">📥 导出数据</button><button class="btn btn-sm btn-ghost" onclick="document.getElementById('importInput').click()">📤 导入数据</button><input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)"><button class="btn btn-sm btn-danger" style="margin-left:.5rem" onclick="resetData()">🔄 重置</button></div>
    <div id="adminPanel"><div class="tab-bar"><button class="tab-btn active" onclick="showAdminTab('builds')">流派</button><button class="tab-btn" onclick="showAdminTab('maps')">地图</button><button class="tab-btn" onclick="showAdminTab('quests')">任务</button><button class="tab-btn" onclick="showAdminTab('comments')">评论</button></div>
    <div id="adminBuilds"></div><div id="adminMaps" style="display:none"></div><div id="adminQuests" style="display:none"></div><div id="adminComments" style="display:none"></div></div></div></section>`;
  showAdminTab('builds');
}

function showAdminTab(tab){
  const store=getStore();
  document.querySelectorAll('#adminPanel .tab-btn').forEach((b,i)=>{b.classList.toggle('active',['builds','maps','quests','comments'][i]===tab)});
  ['adminBuilds','adminMaps','adminQuests','adminComments'].forEach(id=>document.getElementById(id).style.display=id==='admin'+tab.charAt(0).toUpperCase()+tab.slice(1)?'block':'none');
  if(tab==='builds'){
    const all=[...(store.builds||[]).map(b=>({...b,src:'官方'})),...(store.userBuilds||[]).map(b=>({...b,src:'玩家'}))];
    document.getElementById('adminBuilds').innerHTML=`<button class="btn btn-sm btn-primary" style="margin-bottom:1rem" onclick="showAddForm()">+ 新增流派</button>
    <div id="addBuildForm" style="display:none;margin-bottom:1.5rem;padding:1rem;background:#0e0e18;border-radius:8px;border:1px solid #1e1e2e">
      <div class="form-row"><div class="form-group"><label>名称</label><input id="abName"></div><div class="form-group"><label>武器</label><input id="abWeapons"></div></div>
      <div class="form-row"><div class="form-group"><label>Tier</label><select id="abTier"><option value="S">S</option><option value="A">A</option><option value="B">B</option></select></div><div class="form-group"><label>类型</label><input id="abType"></div></div>
      <div class="form-group"><label>心法</label><input id="abXinfa"></div><div class="form-group"><label>描述</label><textarea id="abDesc"></textarea></div>
      <button class="btn btn-sm btn-success" onclick="saveAdminBuild()">保存</button><button class="btn btn-sm btn-ghost" onclick="document.getElementById('addBuildForm').style.display='none'">取消</button></div>
    <table class="admin-table"><tr><th>名称</th><th>武器</th><th>Tier</th><th>来源</th><th>操作</th></tr>${all.map(b=>'<tr><td>'+b.name+'</td><td>'+b.weapons+'</td><td>'+b.tier+'</td><td>'+b.src+'</td><td><button class="btn btn-sm btn-ghost" onclick="deleteBuild(\''+b.id+'\')">删除</button></td></tr>').join('')}</table>`;
  } else if(tab==='maps'){
    document.getElementById('adminMaps').innerHTML=`<table class="admin-table"><tr><th>名称</th><th>顺序</th><th>描述</th></tr>${(store.maps||[]).map(m=>'<tr><td>'+m.name+'</td><td>'+m.order+'</td><td>'+m.desc+'</td></tr>').join('')}</table>`;
  } else if(tab==='quests'){
    document.getElementById('adminQuests').innerHTML=`<table class="admin-table"><tr><th>名称</th><th>区域</th><th>类型</th><th>描述</th></tr>${(store.quests||[]).map(q=>'<tr><td>'+q.name+'</td><td>'+q.map+'</td><td>'+q.type+'</td><td>'+q.desc+'</td></tr>').join('')}</table>`;
  } else if(tab==='comments'){
    const all=Object.entries(store.comments||{});
    document.getElementById('adminComments').innerHTML=all.length===0?'<p style="color:#6a6558;font-size:.85rem">暂无评论</p>':all.map(([bid,cmts])=>'<div style="margin-bottom:1.5rem"><p style="font-size:.85rem;color:#d4a843;margin-bottom:.5rem">Build: '+bid+'</p>'+cmts.map(c=>'<div class="comment-item"><div><span class="author">'+c.author+'</span><span class="time">'+c.time+'</span></div><div class="text">'+c.text+'</div></div>').join('')+'</div>').join('');
  }
}
function showAddForm(){const f=document.getElementById('addBuildForm');f.style.display=f.style.display==='none'?'block':'none'}
function saveAdminBuild(){
  const n=document.getElementById('abName')?.value?.trim();if(!n){toast('请输入名称','error');return}
  const store=getStore();if(!store.builds)store.builds=[];
  store.builds.push({id:'b'+Date.now(),name:n,weapons:document.getElementById('abWeapons')?.value?.trim()||'',tier:document.getElementById('abTier')?.value||'A',type:document.getElementById('abType')?.value?.trim()||'自定义',xinfa:document.getElementById('abXinfa')?.value?.trim()||'',qishu:'',desc:document.getElementById('abDesc')?.value?.trim()||'',tags:[],weaponTags:[],xinfaTags:[]});
  saveStore(store);toast('已保存');document.getElementById('addBuildForm').style.display='none';showAdminTab('builds');
}
function deleteBuild(id){
  if(!confirm('确定删除？'))return;const store=getStore();store.builds=(store.builds||[]).filter(b=>b.id!==id);store.userBuilds=(store.userBuilds||[]).filter(b=>b.id!==id);saveStore(store);toast('已删除');showAdminTab('builds');
}
function shareBuild(){
  const n=document.getElementById('ubName')?.value?.trim();if(!n){toast('请输入流派名称','error');return}
  const store=getStore();if(!store.userBuilds)store.userBuilds=[];
  store.userBuilds.push({id:'u'+Date.now(),name:n,weapons:document.getElementById('ubWeapons')?.value?.trim()||'',tier:document.getElementById('ubTier')?.value||'A',type:'玩家分享',xinfa:document.getElementById('ubXinfa')?.value?.trim()||'',desc:document.getElementById('ubDesc')?.value?.trim()||'',tags:['玩家分享'],weaponTags:[],xinfaTags:[]});
  saveStore(store);toast('配装已分享！感谢你的贡献 🎉');
  ['ubName','ubWeapons','ubXinfa','ubDesc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  renderCommunity();
}
function rateBuild(id,val){
  const store=getStore();if(!store.ratings)store.ratings={};if(!store.ratings[id])store.ratings[id]={total:0,count:0};
  store.ratings[id].total+=val;store.ratings[id].count+=1;saveStore(store);toast('感谢评分！');renderBuildDetail(id);
}
function addComment(id){
  const t=document.getElementById('commentText')?.value?.trim();if(!t){toast('请输入评论','error');return}
  const store=getStore();if(!store.comments)store.comments={};if(!store.comments[id])store.comments[id]=[];
  store.comments[id].push({author:'玩家'+Math.random().toString(36).slice(2,6).toUpperCase(),text:t,time:new Date().toLocaleString('zh-CN')});saveStore(store);toast('评论已发表');renderBuildDetail(id);
}
function exportData(){
  const d=localStorage.getItem(STORE_KEY);if(!d){toast('没有数据','error');return}
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));a.download='yysls_data_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('已导出');
}
function importData(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=function(ev){try{localStorage.setItem(STORE_KEY,ev.target.result);toast('已导入，刷新页面');setTimeout(()=>location.reload(),1000)}catch(err){toast('导入失败','error')}};r.readAsText(f);
}
function resetData(){
  if(!confirm('确定重置所有数据？评论、评分、玩家分享都会丢失！'))return;localStorage.removeItem(STORE_KEY);initStore();toast('已重置');router();
}

// ===== ROUTER INIT =====
function router(){
  const path=window.location.pathname;const route=matchRoute(path);initStore();updateMeta(route);
  document.querySelectorAll('.nav-item').forEach(a=>a.classList.toggle('active-link',a.dataset.route===path));
  switch(route){case'home':renderHome();break;case'builds':renderBuilds();break;case'buildDetail':renderBuildDetail(path.match(/^\/build\/(.+)$/)[1]);break;case'maps':renderMaps();break;case'quests':renderQuests();break;case'community':renderCommunity();break;case'admin':renderAdmin();break;default:renderHome()}
  window.scrollTo(0,0);
}
window.addEventListener('popstate',router);
document.addEventListener('click',e=>{
  const t=document.getElementById('navToggle');const l=document.getElementById('navLinks');
  if(t&&l&&(e.target.closest('#navToggle')||e.target.closest('.nav-item')))l.classList.toggle('open');
});
window.addEventListener('load',()=>{setTimeout(()=>document.getElementById('loader').classList.add('hidden'),500);setTimeout(router,550)});
if(window.location.pathname==='/')router();
</script>
