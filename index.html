let currentLang = localStorage.getItem('yysls_lang') || 'zh-CN';
function t(key) { return LANG_DATA[currentLang]?.[key] || LANG_DATA['zh-CN']?.[key] || key; }
function toggleLang() {
  currentLang = currentLang === 'zh-CN' ? 'en' : 'zh-CN';
  localStorage.setItem('yysls_lang', currentLang);
  document.documentElement.lang = currentLang === 'zh-CN' ? 'zh-CN' : 'en';
  const btn = document.getElementById('langBtn');
  if (btn) btn.textContent = t('langLabel');
  // Re-render current page with new language
  const path = window.location.pathname;
  const route = matchRoute(path);
  if (route !== 'buildDetail') router();
  else renderBuildDetail(path.match(/^\/build\/(.+)$/)[1]);
}

function initStore(){
  let s=getStore();
  if(!s){s={builds:JSON.parse(JSON.stringify(D_BUILDS)),maps:JSON.parse(JSON.stringify(D_MAPS)),quests:JSON.parse(JSON.stringify(D_QUESTS)),comments:{},ratings:{},userBuilds:[],clueFound:[]};saveStore(s)}
  return s;
}

function toast(m,t){
  const e=document.createElement('div');e.className='toast toast-'+(t||'success');e.textContent=m;
  document.body.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2500);
}

// ===== ROUTER =====
function navigate(p){window.history.pushState(null,'',p);router()}
function matchRoute(path){
  if(path.match(/^\/build\/(.+)$/))return'buildDetail';
  const k=path.replace('/','').split('/')[0]||'home';
  return['builds','maps','clues','shefu','quests','community','admin'].includes(k)?k:'home';
}

function filterBuilds(){
  const q=(document.getElementById('buildSearch')?.value||'').toLowerCase();const w=document.getElementById('weaponFilter')?.value||'';const t=document.getElementById('tierFilter')?.value||'';
  const store=getStore();const all=[...(store.builds||[]),...(store.userBuilds||[]).map(b=>({...b,isUser:true}))];const ratings=store.ratings||{};
  const filtered=all.filter(b=>{if(q&&!b.name.toLowerCase().includes(q)&&!b.weapons.toLowerCase().includes(q)&&!b.xinfa.toLowerCase().includes(q))return false;if(w&&!b.weaponTags?.some(x=>x.includes(w)))return false;if(t&&b.tier!==t)return false;return true});
  const grid=document.getElementById('buildGrid');if(!grid)return;
  grid.innerHTML=filtered.map(b=>{const r=ratings[b.id];const rs=r&&r.count>0?'<span style="color:#f0c860">★</span> '+(r.total/r.count).toFixed(1)+' ('+r.count+'人)':'';return'<div class="build-card" onclick="navigate(\'/build/'+b.id+'\')"><div class="meta">'+b.tier+'-Tier · '+b.type+'</div><h3>'+b.name+(b.isUser?' <span class="editing-badge">玩家分享</span>':'')+'</h3><div class="sub">'+b.weapons+'</div><div class="tags">'+b.tags.map(t=>'<span class="tag '+(t.includes('S')?'tag-s':t.includes('A')?'tag-a':'tag-b')+'">'+t+'</span>').join('')+'</div><p>'+b.desc+'</p>'+(rs?'<div class="rating-mini">'+rs+'</div>':'')+'</div>'}).join('');
}

    <div class="card" style="margin-top:1.5rem"><div class="section-title">${currentLang==='en'?'Details':'详情'}</div><p>${build.desc}</p><div style="margin-top:.75rem;display:flex;gap:.4rem;flex-wrap:wrap">${build.tags.map(t=>'<span class="tag tag-s">'+t+'</span>').join('')}</div></div>

    <div class="card" style="margin-top:1.5rem"><div class="section-title">${currentLang==='en'?'Comments':'评论'}(${comments.length})</div><div class="comment-box"><textarea id="commentText" placeholder="${currentLang==='en'?'Write a comment...':'写下你的看法...'}"></textarea><button class="btn btn-sm btn-primary" style="margin-top:.5rem" onclick="addComment('${id}')">${currentLang==='en'?'Post Comment':'发表评论'}</button></div><div id="commentList">${comments.length===0?'<p style="color:#6a6558;font-size:.85rem;padding:1rem 0">'+(currentLang==='en'?'No comments yet':'暂无评论')+'</p>':comments.map(c=>'<div class="comment-item"><div><span class="author">'+c.author+'</span><span class="time">'+c.time+'</span></div><div class="text">'+c.text+'</div></div>').join('')}</div></div>

function renderClues(){
  const store=getStore();const found=store.clueFound||[];
  const mapKeys=[{key:'all',label:t('cluesTabAll')},{key:'qinhe',label:t('cluesTabQinhe')},{key:'kaifeng',label:t('cluesTabKaifeng')},{key:'bujianshan',label:t('cluesTabBujianshan')},{key:'hexi',label:t('cluesTabHexi')},{key:'qingzhou',label:t('cluesTabQingzhou')},{key:'pengshan',label:t('cluesTabPengshan')}];
  const groups={};D_CLUES.forEach(c=>{if(!groups[c.map])groups[c.map]=[];groups[c.map].push(c)});
  const total=D_CLUES.length;const foundCount=found.length;

  document.getElementById('app').innerHTML=`<section class="page-section"><div class="container">
    <h2>${t('sectionClues')}·<span style="font-weight:300;color:#8a8478">Clues</span></h2>
    <p style="text-align:center;color:#6a6558;margin-bottom:1.5rem;font-size:.85rem">${t('clueDesc')}</p>
    <div id="clueProgressDisplay" style="text-align:center;margin-bottom:2rem;font-size:1.1rem;color:#d4a843">${t('clueProgress')} ${foundCount}${t('clueOf')}${total}${t('clueItems')}</div>
    <div class="lang-selector" id="clueTabs">${mapKeys.map((mk,i)=>'<button class="'+(i===0?'active':'')+'" data-map="'+mk.key+'">'+mk.label+'</button>').join('')}</div>
    <div class="clue-grid" id="clueGrid">${renderClueCards('all',groups,found)}</div>
  </div></section>`;

  setTimeout(()=>{
    document.getElementById('clueTabs')?.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.getElementById('clueTabs').querySelectorAll('button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const grid=document.getElementById('clueGrid');
        if(grid)grid.innerHTML=renderClueCards(btn.dataset.map,groups,found);
      });
    });
  },50);
}

function renderClueCards(filter,groups,found){
  let items;
  if(filter==='all'){items=[];Object.values(groups).forEach(g=>items.push(...g))}
  else items=groups[filter]||[];
  return items.map(c=>{
    const isFound=found.includes(c.id);
    return '<div class="clue-card"><h4>'+c.name+'</h4><p>📍 '+c.area+'</p><div class="clue-progress">'+(currentLang==='en'?'Location: '+c.area+' · '+c.mapName:'区域：'+c.area)+'</div><p>'+c.desc+'</p><label class="clue-row"><input type="checkbox" '+(isFound?'checked':'')+' onchange="toggleClue(\''+c.id+'\')"><span class="'+(isFound?'found':'')+'" id="clueLabel-'+c.id+'">'+(isFound?(currentLang==='en'?'✓ Found':'✓ 已找到'):(currentLang==='en'?'Mark as found':'标记为已找到'))+'</span></label></div>';
  }).join('');
}

function toggleClue(id){
  const store=getStore();if(!store.clueFound)store.clueFound=[];
  const idx=store.clueFound.indexOf(id);
  if(idx>-1)store.clueFound.splice(idx,1);
  else store.clueFound.push(id);
  saveStore(store);
  const mapFilter=document.querySelector('#clueTabs .active')?.dataset?.map||'all';
  const groups={};D_CLUES.forEach(c=>{if(!groups[c.map])groups[c.map]=[];groups[c.map].push(c)});
  const grid=document.getElementById('clueGrid');
  if(grid)grid.innerHTML=renderClueCards(mapFilter,groups,store.clueFound||[]);

  if(langBtn)langBtn.textContent=t('langLabel');
  updateFooter();
  switch(route){case'home':renderHome();break;case'builds':renderBuilds();break;case'buildDetail':renderBuildDetail(path.match(/^\/build\/(.+)$/)[1]);break;case'maps':renderMaps();break;case'clues':renderClues();break;case'shefu':renderShefu();break;case'quests':renderQuests();break;case'community':renderCommunity();break;case'admin':renderAdmin();break;default:renderHome()}
  window.scrollTo(0,0);
}
window.addEventListener('popstate',router);
document.addEventListener('click',e=>{
  const t=document.getElementById('navToggle');const l=document.getElementById('navLinks');
  if(t&&l&&(e.target.closest('#navToggle')||e.target.closest('.nav-item')||e.target.closest('.lang-btn')))l.classList.toggle('open');
});
window.addEventListener('load',()=>{setTimeout(()=>document.getElementById('loader').classList.add('hidden'),500);setTimeout(router,550)});
if(window.location.pathname==='/')router();
</script>
